app:
  name: PaperWeave
  environment: development
  log_level: INFO
  metrics_file: data/metadata/runtime_metrics.json

paths:
  data_dir: data
  raw_pdfs_dir: data/raw_pdfs
  parsed_text_dir: data/parsed_text
  parsed_markdown_dir: data/parsed_markdown
  jsonl_dir: data/jsonl
  metadata_dir: data/metadata
  eval_questions_dir: data/eval_questions
  basic_rag_dir: data/chroma
  benchmark_dir: benchmarks
  evaluation_dir: evaluations
  report_dir: reports
  log_dir: logs

providers:
  llm:
    provider: gemini
    model: gemini-2.0-flash
    base_url: https://generativelanguage.googleapis.com
    api_key_env: GEMINI_API_KEY
    temperature: 0.1
    max_tokens: 512
    timeout_seconds: 300
    pricing:
      prompt_per_1k: 0.0
      completion_per_1k: 0.0
  embeddings:
    provider: ollama
    model: nomic-embed-text
    base_url: http://localhost:11434
    dimensions: 768
  judge:
    provider: gemini
    model: gemini-2.0-flash
    base_url: https://generativelanguage.googleapis.com
    api_key_env: GEMINI_API_KEY
    timeout_seconds: 300

dataset:
  query: 'cat:cs.CL AND ("large language model" OR "LLM" OR "retrieval augmented generation" OR "GraphRAG" OR "hallucination" OR "transformer" OR "retrieval")'
  max_results: 500
  target_tokens: 2000000
  min_tokens_per_paper: 1000
  request_delay_seconds: 1.0
  categories:
    - LLM
    - RAG
    - GraphRAG
    - hallucination detection
    - transformers
    - retrieval
    - NLP
  curated_ids:
    - "1706.03762"
    - "1810.04805"
    - "2005.14165"
    - "2004.04906"
    - "2004.12832"
    - "2005.11401"
    - "2205.14135"
    - "2302.13971"
    - "2307.09288"
    - "2310.06825"
    - "2401.04088"
  curated_titles:
    - Attention Is All You Need
    - "BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding"
    - Language Models are Few-Shot Learners
    - "LLaMA: Open and Efficient Foundation Language Models"
    - "Llama 2: Open Foundation and Fine-Tuned Chat Models"
    - Mistral 7B
    - Mixtral of Experts
    - Qwen2 Technical Report
    - Qwen2.5 Technical Report
    - Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks
    - "Self-RAG: Learning to Retrieve, Generate, and Critique through Self-Reflection"
    - Dense Passage Retrieval for Open-Domain Question Answering
    - "ColBERT: Efficient and Effective Passage Search via Contextualized Late Interaction over BERT"
    - "FlashAttention: Fast and Memory-Efficient Exact Attention with IO-Awareness"
    - "GraphRAG: Unlocking LLM discovery on narrative private data"

chunking:
  strategy: semantic
  chunk_size: 1400
  overlap: 200
  semantic_threshold: 0.95

retrieval:
  basic_rag_top_k: 5
  graphrag_top_k: 5
  graphrag_num_hops: 2
  graphrag_community_level: 2

graphrag:
  api_base: http://localhost:8000
  graph_name: PaperWeave
  chunker: semantic
  extractor: llm
  top_k: 5
  num_hops: 2
  community_level: 2
  chunk_only: true
  doc_only: false

tigergraph:
  hostname: http://localhost
  restpp_port: 9000
  gsql_port: 14240
  username: tigergraph
  password: tigergraph
  graph_name: PaperWeave

evaluation:
  bertscore_model: microsoft/deberta-xlarge-mnli
  bertscore_backend: evaluate
  bertscore_device: cpu
  judge_enabled: true
  categories:
    - lookup
    - multi_hop_reasoning
    - comparison
    - summarization
    - graph_traversal_reasoning
