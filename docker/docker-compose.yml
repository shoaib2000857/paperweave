services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    env_file:
      - ../.env
    environment:
      LLM_BASE_URL: http://host.docker.internal:11434
      EMBEDDING_BASE_URL: http://host.docker.internal:11434
      JUDGE_BASE_URL: http://host.docker.internal:11434
      GRAPHRAG_API_BASE: http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../backend:/app/backend
      - ../data:/app/data
      - ../configs:/app/configs
      - ../logs:/app/logs
    ports:
      - "${BACKEND_HOST_PORT:-8009}:8008"

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8009}
    volumes:
      - ../frontend/app:/app/app
      - ../frontend/components:/app/components
      - ../frontend/lib:/app/lib
      - ../frontend/public:/app/public
      - ../frontend/types:/app/types
    ports:
      - "3000:3000"
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:v1.13.2
    profiles: ["optional"]
    ports:
      - "6333:6333"
