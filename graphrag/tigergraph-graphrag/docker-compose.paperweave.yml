services:
  tigergraph:
    image: tigergraph/community:4.2.2
    container_name: tigergraph
    platform: linux/amd64
    ports:
      - "14240:14240"
    volumes:
      - tigergraph_data:/home/tigergraph/tigergraph/data

  graphrag:
    image: tigergraph/graphrag:latest
    platform: linux/amd64
    container_name: graphrag
    build:
      context: .
      dockerfile: graphrag/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - tigergraph
      - graphrag-ecc
      - chat-history
    environment:
      SERVER_CONFIG: "/code/configs/server_config.paperweave.json"
      LOGLEVEL: "INFO"
      USE_CYPHER: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./configs/:/code/configs
      - ../../data:/paperweave-data

  graphrag-ecc:
    image: tigergraph/graphrag-ecc:latest
    platform: linux/amd64
    container_name: graphrag-ecc
    build:
      context: .
      dockerfile: ecc/Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      - tigergraph
    environment:
      SERVER_CONFIG: "/code/configs/server_config.paperweave.json"
      LOGLEVEL: "INFO"
      INIT_EMBED_STORE: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./configs/:/code/configs
      - ../../data:/paperweave-data

  chat-history:
    image: tigergraph/chat-history:latest
    platform: linux/amd64
    container_name: chat-history
    build:
      context: chat-history/
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      CONFIG_FILES: "/configs/server_config.paperweave.json"
      LOGLEVEL: "INFO"
    volumes:
      - ./configs/:/configs

volumes:
  tigergraph_data:
